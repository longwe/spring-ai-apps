<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 760px;
      height: 90vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 20px;
      background: #1a73e8;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .message .label {
      font-size: 0.72rem;
      color: #888;
      margin-bottom: 4px;
    }

    .message.user .label { text-align: right; }

    .message .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #f0f2f5;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .message.assistant .bubble.streaming::after {
      content: '▋';
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
    }

    .input-area input:focus { border-color: #1a73e8; }

    .input-area button {
      padding: 10px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .input-area button:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Spring AI Chat</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="input" type="text" placeholder="Type a message…" autofocus />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(role, text = '') {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = role === 'user' ? 'You' : 'Assistant';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrapper.appendChild(label);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = '';
      sendBtn.disabled = true;

      addMessage('user', message);
      const bubble = addMessage('assistant');
      bubble.classList.add('streaming');

      try {
        const res = await fetch(`/chat/stream?message=${encodeURIComponent(message)}`, {
          headers: { Accept: 'text/event-stream' }
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let responseText = '';
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // hold incomplete line

          for (const line of lines) {
            if (line.startsWith('data:')) {
              // slice(5) preserves the space token that EventSource would strip
              responseText += line.slice(5);
              bubble.textContent = responseText;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          }
        }
      } catch (err) {
        bubble.textContent = 'Error: ' + err.message;
      } finally {
        bubble.classList.remove('streaming');
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
