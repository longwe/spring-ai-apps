<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring AI Chat with Memory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --user-bubble: #4f46e5;
      --user-text: #ffffff;
      --ai-bubble: #f0f1f5;
      --ai-text: #1e1e2e;
      --border: #e2e4ed;
      --muted: #8b90a7;
      --radius: 18px;
      --shadow: 0 8px 32px rgba(79,70,229,0.10);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 780px;
      height: 90vh;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-info h1 {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .header-info p {
      font-size: 0.85rem;
      opacity: 0.75;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 0 2px rgba(74,222,128,0.3);
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .new-chat-btn:hover { background: rgba(255,255,255,0.25); }

    /* Memory badge */
    .memory-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #ede9fe;
      border-top: 1px solid #ddd6fe;
      font-size: 0.78rem;
      color: #6d28d9;
      font-weight: 500;
      flex-shrink: 0;
    }

    .memory-badge span { opacity: 0.7; font-weight: 400; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    .empty-state .icon { font-size: 48px; }
    .empty-state h2 { font-size: 1.1rem; font-weight: 600; color: #3730a3; }
    .empty-state p { font-size: 0.875rem; }

    /* Message row */
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
    }

    .avatar.user { background: var(--primary); color: #fff; }
    .avatar.ai   { background: #ede9fe; color: #7c3aed; }

    .message-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 70%;
    }

    .message-row.user .message-col { align-items: flex-end; }

    .sender-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      padding: 0 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 1.05rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-row.user .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .message-row.ai .bubble {
      background: var(--ai-bubble);
      color: var(--ai-text);
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
      background: var(--ai-bubble);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    .streaming::after {
      content: '▋';
      color: var(--primary);
      animation: blink 0.7s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Model selector */
    .model-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: #fafbff;
      flex-shrink: 0;
    }

    .model-bar label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .model-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .model-btn:hover { border-color: var(--primary); color: var(--primary); }

    .model-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    /* Input area */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-area textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 1.05rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s;
      color: var(--ai-text);
      background: #fafbff;
    }

    .input-area textarea:focus { border-color: var(--primary); }
    .input-area textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover:not(:disabled) { background: var(--primary-dark); transform: scale(1.05); }
    .send-btn:disabled { background: #c7c8d4; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="chat-container">

    <div class="chat-header">
      <div class="header-avatar">🧠</div>
      <div class="header-info">
        <h1>Spring AI Chat with Memory</h1>
        <p>Remembers your conversation context</p>
      </div>
      <div class="header-actions">
        <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
        <div class="status-dot"></div>
      </div>
    </div>

    <div class="memory-badge">
      🔒 <span>Session ID:</span> <strong id="sessionIdDisplay"></strong>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="icon">🧠</div>
        <h2>Memory-enabled conversation</h2>
        <p>I remember everything you tell me in this session.<br>Start a new chat to reset the memory.</p>
      </div>
    </div>

    <div class="model-bar">
      <label>Model</label>
      <button class="model-btn active" data-model="openai">🤖 OpenAI</button>
      <button class="model-btn" data-model="anthropic">✳️ Anthropic</button>
      <button class="model-btn" data-model="gemini">💎 Gemini</button>
    </div>

    <div class="input-area">
      <textarea id="input" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for new line)"></textarea>
      <button class="send-btn" id="send" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send');
    const newChatBtn = document.getElementById('newChatBtn');
    const sessionDisplay = document.getElementById('sessionIdDisplay');

    // Generate a UUID for the conversation session
    function uuid() {
      return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
    }

    let conversationId = uuid();
    sessionDisplay.textContent = conversationId.slice(0, 8) + '…';

    // Model selection
    let selectedModel = 'openai';
    const modelBtns = document.querySelectorAll('.model-btn');
    modelBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modelBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedModel = btn.dataset.model;
      });
    });

    // New chat: clear memory on server and reset UI
    newChatBtn.addEventListener('click', async () => {
      try {
        await fetch(`/chat/memory/${conversationId}`, { method: 'DELETE' });
      } catch (_) {}
      conversationId = uuid();
      sessionDisplay.textContent = conversationId.slice(0, 8) + '…';
      messagesEl.innerHTML = `
        <div class="empty-state" id="emptyState">
          <div class="icon">🧠</div>
          <h2>Memory-enabled conversation</h2>
          <p>I remember everything you tell me in this session.<br>Start a new chat to reset the memory.</p>
        </div>`;
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    function addMessageRow(role) {
      const emptyState = document.getElementById('emptyState');
      if (emptyState) emptyState.remove();

      const row = document.createElement('div');
      row.className = `message-row ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === 'user' ? 'U' : '🧠';

      const col = document.createElement('div');
      col.className = 'message-col';

      const label = document.createElement('div');
      label.className = 'sender-label';
      label.textContent = role === 'user' ? 'You' : selectedModel.charAt(0).toUpperCase() + selectedModel.slice(1);

      col.appendChild(label);
      row.appendChild(avatar);
      row.appendChild(col);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return col;
    }

    function addBubble(col) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      col.appendChild(bubble);
      return bubble;
    }

    function addTypingIndicator(col) {
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';
      col.appendChild(indicator);
      return indicator;
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      const userCol = addMessageRow('user');
      addBubble(userCol).textContent = message;

      const aiCol  = addMessageRow('ai');
      const typing = addTypingIndicator(aiCol);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const url = `/chat/stream?message=${encodeURIComponent(message)}&model=${selectedModel}&conversationId=${encodeURIComponent(conversationId)}`;
        const res = await fetch(url, { headers: { Accept: 'text/event-stream' } });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let responseText = '';
        let bubble = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (line.startsWith('data:')) {
              const token = line.slice(5);

              if (!bubble) {
                typing.remove();
                bubble = addBubble(aiCol);
                bubble.classList.add('streaming');
              }

              responseText += token;
              bubble.textContent = responseText;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          }
        }

        if (bubble) bubble.classList.remove('streaming');

      } catch (err) {
        typing.remove();
        addBubble(aiCol).textContent = 'Error: ' + err.message;
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
  </script>
</body>
</html>
